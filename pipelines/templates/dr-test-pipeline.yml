# dr-test-pipeline.yml
# Automated quarterly DR failover test pipeline.
# Triggers ASR test failover into isolated network, validates app, cleans up.

schedules:
  - cron: '0 2 1 */3 *'   # 02:00 UTC on 1st day of every 3rd month
    displayName: Quarterly DR Test
    branches: { include: [main] }
    always: true

parameters:
  - name: workloadName
    type: string
    displayName: Workload Name
  - name: vaultName
    type: string
    displayName: Recovery Services Vault Name
  - name: vaultResourceGroup
    type: string
    displayName: Vault Resource Group
  - name: isolatedNetworkId
    type: string
    displayName: Isolated Test VNet Resource ID

variables:
  - group: migration-azure-creds

stages:

  - stage: PreDRChecks
    displayName: '1 — Pre-DR Validation'
    jobs:
      - job: checks
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: AzurePowerShell@5
            displayName: 'Validate replication health'
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              ScriptType: InlineScript
              Inline: |
                $vault = Get-AzRecoveryServicesVault -Name '${{ parameters.vaultName }}' `
                    -ResourceGroupName '${{ parameters.vaultResourceGroup }}'
                Set-AzRecoveryServicesVaultContext -Vault $vault
                $items    = Get-AzRecoveryServicesAsrReplicationProtectedItem
                $unhealthy = $items | Where-Object { $_.ReplicationHealth -ne 'Normal' }
                if ($unhealthy.Count -gt 0) {
                    throw "Unhealthy replications: $($unhealthy.FriendlyName -join ', ')"
                }
                Write-Host "All $($items.Count) replications healthy." -ForegroundColor Green
              azurePowerShellVersion: LatestVersion

  - stage: TestFailover
    displayName: '2 — Test Failover (Isolated Network)'
    dependsOn: PreDRChecks
    jobs:
      - deployment: dr_test
        environment: dr-test
        pool: { vmImage: ubuntu-latest }
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    pip install azure-identity azure-mgmt-recoveryservices --quiet
                    python tests/dr/run_dr_test.py \
                      --workload    '${{ parameters.workloadName }}' \
                      --vault       '${{ parameters.vaultName }}' \
                      --vault-rg    '${{ parameters.vaultResourceGroup }}' \
                      --network     '${{ parameters.isolatedNetworkId }}'
                  displayName: 'Initiate ASR test failover'
                  env:
                    AZURE_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

  - stage: ValidateDR
    displayName: '3 — Validate App in DR'
    dependsOn: TestFailover
    jobs:
      - job: validate
        pool: { vmImage: ubuntu-latest }
        steps:
          - script: |
              pip install azure-identity azure-mgmt-compute azure-mgmt-network --quiet
              python tests/smoke/run_wave_smoke_tests.py \
                --vms "$(DR_VM_NAMES)" \
                --subscription $(ARM_SUBSCRIPTION_ID)
            displayName: 'Smoke tests against DR VMs'
            env:
              AZURE_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

  - stage: DocumentResults
    displayName: '4 — Publish DR Test Report'
    dependsOn: ValidateDR
    jobs:
      - job: report
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/dr-test-results.xml'
              testRunTitle: 'Quarterly DR Test — ${{ parameters.workloadName }}'

  - stage: Cleanup
    displayName: '5 — Cleanup Test Failover VMs'
    dependsOn: ValidateDR
    condition: always()
    jobs:
      - job: cleanup
        pool: { vmImage: ubuntu-latest }
        steps:
          - task: AzurePowerShell@5
            displayName: 'Remove ASR test failover VMs'
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              ScriptType: InlineScript
              Inline: |
                $vault = Get-AzRecoveryServicesVault -Name '${{ parameters.vaultName }}' `
                    -ResourceGroupName '${{ parameters.vaultResourceGroup }}'
                Set-AzRecoveryServicesVaultContext -Vault $vault
                Get-AzRecoveryServicesAsrReplicationProtectedItem |
                  Where-Object { $_.FailoverRecoveryPointId } |
                  ForEach-Object {
                    Start-AzRecoveryServicesAsrTestFailoverCleanupJob -ReplicationProtectedItem $_
                  }
                Write-Host 'DR test VMs cleaned up successfully.' -ForegroundColor Green
              azurePowerShellVersion: LatestVersion
